<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三關：雙人短語練習</title>
    <script src="data.js"></script>
    <style>
        body { 
            font-family: "jf-open-huninn", "Microsoft JhengHei", sans-serif; 
            background-color: #f1f8e9; 
            margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; box-sizing: border-box; 
        }
        
        .main-container { width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px 2%; box-sizing: border-box; }
        
        .header-area { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; max-width: 1600px; }
        h1 { color: #388e3c; font-size: clamp(28px, 3.5vw, 45px); margin: 0; text-shadow: 2px 2px 0px #c8e6c9; }
        
        .nav-btn { 
            background-color: #ffb74d; color: #ffffff; text-decoration: none; font-size: clamp(16px, 1.5vw, 24px); font-weight: bold; 
            padding: 10px 20px; border-radius: 50px; box-shadow: 0 5px 0 #f57c00; transition: 0.2s; border: 3px solid #fff;
        }
        .nav-btn:hover { transform: translateY(4px); box-shadow: 0 0 0 #f57c00; background-color: #ffa726; }

        /* 🌟 雙人分割畫面大框架 */
        .split-screen {
            display: flex; width: 100%; max-width: 1600px; gap: 20px; flex-grow: 1;
        }

        /* 個別選手的版面 */
        .player-board {
            flex: 1; border-radius: 40px; padding: 20px 30px; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 15px 25px rgba(0,0,0,0.08); border: 8px solid #fff; position: relative;
        }
        
        /* 兔兔選手 (左) */
        .p1-board { background-color: #ffebee; border-color: #ffcdd2; }
        .p1-board .player-title { color: #d32f2f; background: #ffcdd2; }
        .p1-board .word-block { background: #ef5350; border-color: #e53935; box-shadow: 0 6px 0 #c62828; }
        .p1-board .word-block:active { box-shadow: 0 0 0 #c62828; }
        
        /* 熊熊選手 (右) */
        .p2-board { background-color: #e3f2fd; border-color: #bbdefb; }
        .p2-board .player-title { color: #1976d2; background: #bbdefb; }
        .p2-board .word-block { background: #42a5f5; border-color: #1e88e5; box-shadow: 0 6px 0 #1565c0; }
        .p2-board .word-block:active { box-shadow: 0 0 0 #1565c0; }

        .player-title {
            font-size: clamp(24px, 2.5vw, 36px); font-weight: bold; padding: 10px 30px; border-radius: 50px; 
            margin-bottom: 20px; border: 4px solid #fff;
        }

        /* 答題區與選字區 */
        .answer-zone {
            min-height: 120px; width: 100%; border-bottom: 6px dashed rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; padding-bottom: 20px; margin-bottom: 20px;
        }
        .pool-zone {
            min-height: 120px; width: 100%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px;
        }

        /* 共用方塊樣式 */
        .word-block {
            font-size: clamp(26px, 2.5vw, 40px); font-weight: bold; color: #fff; 
            border-radius: 20px; padding: 15px 25px; cursor: pointer; border-width: 4px; border-style: solid;
            transition: transform 0.1s, box-shadow 0.1s; font-family: "Microsoft JhengHei";
        }
        .word-block:active { transform: translateY(6px); }
        
        .word-placeholder {
            background: rgba(255,255,255,0.5) !important; border-style: dashed !important; border-color: rgba(0,0,0,0.2) !important; color: transparent !important; pointer-events: none; box-shadow: none !important;
        }

        .msg { font-size: clamp(24px, 2vw, 32px); font-weight: bold; height: 40px; margin-top: 20px; text-align: center;}
        
        /* 震動錯誤提示 */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.4s; }

        /* 底部共用控制區 */
        .bottom-controls { width: 100%; text-align: center; margin-top: 20px; min-height: 80px;}
        .next-btn { 
            background-color: #66bb6a; color: white; font-size: clamp(24px, 2.5vw, 36px); font-weight: bold; 
            padding: 15px 50px; border-radius: 50px; border: 4px solid #fff; cursor: pointer; box-shadow: 0 8px 0 #388e3c; display: none; margin: 0 auto;
            animation: pulse 1.5s infinite;
        }
        .next-btn:active { transform: translateY(8px); box-shadow: none; animation: none;}

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* 手機直向時改成上下疊放 */
        @media (max-width: 900px) {
            .split-screen { flex-direction: column; }
            .word-block { padding: 10px 15px; font-size: 24px;}
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-area">
            <h1>🐻 第三關：雙人短語接力 💬</h1>
            <div class="header-btns"><a href="index.html" class="nav-btn">🏠 回首頁</a></div>
        </div>
        
        <div class="split-screen">
            <div class="player-board p1-board">
                <div class="player-title">🐰 兔兔選手</div>
                <div class="answer-zone" id="p1-answer"></div>
                <div class="pool-zone" id="p1-pool"></div>
                <div class="msg" id="p1-msg" style="color:#c62828;"></div>
            </div>

            <div class="player-board p2-board">
                <div class="player-title">🐻 熊熊選手</div>
                <div class="answer-zone" id="p2-answer"></div>
                <div class="pool-zone" id="p2-pool"></div>
                <div class="msg" id="p2-msg" style="color:#1565c0;"></div>
            </div>
        </div>
        
        <div class="bottom-controls">
            <button id="next-btn" class="next-btn" onclick="nextQuestion()">兩人過關！換下一題 ➡️</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "3"; 
        const levelData = allLessonsData[lessonId] ? allLessonsData[lessonId].level3 : [];
        
        let currentIdx = 0;
        let originalOrder = [];
        
        // 兩位玩家的狀態
        let p1Data = { blocks: [], clickOrder: 0, isFinished: false };
        let p2Data = { blocks: [], clickOrder: 0, isFinished: false };
        
        let synth = window.speechSynthesis;

        function startGame() {
            if(!levelData || levelData.length === 0) { 
                document.querySelector('.split-screen').innerHTML = "<h2 style='color:red; text-align:center; width:100%;'>這課沒有短語題庫喔！</h2>"; return; 
            }
            currentIdx = 0; loadQuestion();
        }

        function loadQuestion() {
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('p1-msg').innerText = "";
            document.getElementById('p2-msg').innerText = "";
            
            const q = levelData[currentIdx];
            originalOrder = [...q.parts];
            
            // 分別打亂給兩位玩家 (避免他們看對方的順序)
            let temp1 = [...q.parts].sort(() => Math.random() - 0.5);
            let temp2 = [...q.parts].sort(() => Math.random() - 0.5);
            
            p1Data = { clickOrder: 0, isFinished: false, blocks: temp1.map((text, i) => ({ id: `p1-b${i}`, text: text, inAnswer: false, order: 0 })) };
            p2Data = { clickOrder: 0, isFinished: false, blocks: temp2.map((text, i) => ({ id: `p2-b${i}`, text: text, inAnswer: false, order: 0 })) };
            
            renderBoard(1);
            renderBoard(2);
        }

        function renderBoard(playerNum) {
            const pData = playerNum === 1 ? p1Data : p2Data;
            const answerZone = document.getElementById(`p${playerNum}-answer`);
            const poolZone = document.getElementById(`p${playerNum}-pool`);
            
            answerZone.innerHTML = ''; poolZone.innerHTML = '';

            // 渲染下方選字區
            pData.blocks.forEach(block => {
                let btn = document.createElement('button');
                btn.innerText = block.text;
                if (block.inAnswer) {
                    btn.className = 'word-block word-placeholder';
                } else {
                    btn.className = 'word-block';
                    if(!pData.isFinished) btn.onclick = () => moveToAnswer(playerNum, block.id);
                }
                poolZone.appendChild(btn);
            });

            // 渲染上方答題區 (依點擊順序排列)
            let answerBlocks = pData.blocks.filter(b => b.inAnswer).sort((a, b) => a.order - b.order);
            answerBlocks.forEach(block => {
                let btn = document.createElement('button');
                btn.className = 'word-block';
                btn.innerText = block.text;
                if(!pData.isFinished) btn.onclick = () => returnToPool(playerNum, block.id);
                answerZone.appendChild(btn);
            });

            // 如果全部方塊都點上去了，就檢查答案
            if (answerBlocks.length === originalOrder.length && !pData.isFinished) {
                checkAnswer(playerNum, answerBlocks);
            }
        }

        function moveToAnswer(playerNum, blockId) {
            const pData = playerNum === 1 ? p1Data : p2Data;
            let block = pData.blocks.find(b => b.id === blockId);
            block.inAnswer = true;
            block.order = pData.clickOrder++;
            renderBoard(playerNum);
        }

        function returnToPool(playerNum, blockId) {
            const pData = playerNum === 1 ? p1Data : p2Data;
            let block = pData.blocks.find(b => b.id === blockId);
            block.inAnswer = false;
            renderBoard(playerNum);
        }

        function checkAnswer(playerNum, answerBlocks) {
            const pData = playerNum === 1 ? p1Data : p2Data;
            const msgEl = document.getElementById(`p${playerNum}-msg`);
            
            let currentSentence = answerBlocks.map(b => b.text).join("");
            let correctSentence = originalOrder.join("");

            if (currentSentence === correctSentence) {
                // 該玩家過關
                pData.isFinished = true;
                msgEl.innerText = "🌟 拼對了！等你隊友！";
                renderBoard(playerNum); // 重新渲染以鎖定按鈕
                
                checkBothFinished(); // 檢查是否兩人都過關
            } else {
                // 拼錯了
                msgEl.innerText = "順序怪怪的喔！";
                const ansZoneBtns = document.getElementById(`p${playerNum}-answer`).querySelectorAll('.word-block');
                ansZoneBtns.forEach(btn => {
                    btn.classList.add('shake');
                    setTimeout(() => btn.classList.remove('shake'), 400);
                });
            }
        }

        function checkBothFinished() {
            if (p1Data.isFinished && p2Data.isFinished) {
                document.getElementById('p1-msg').innerText = "🎉 過關！";
                document.getElementById('p2-msg').innerText = "🎉 過關！";
                
                document.getElementById('next-btn').style.display = "inline-block";
                
                // 兩人皆完成時朗讀完整句子
                let correctSentence = originalOrder.join("");
                synth.cancel();
                let utter = new SpeechSynthesisUtterance(correctSentence);
                utter.lang = 'zh-TW'; utter.rate = 0.85;
                synth.speak(utter);
            }
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < levelData.length) {
                loadQuestion();
            } else {
                document.querySelector('.split-screen').innerHTML = "<div style='text-align:center; width:100%; padding:50px;'><h1 style='font-size:60px;'>🎉 恭喜兔兔與熊熊！全部過關！</h1></div>";
                let btn = document.getElementById('next-btn');
                btn.innerText = "🏠 回到樂園";
                btn.onclick = () => window.location.href = 'index.html';
                btn.style.animation = "none";
            }
        }

        window.onload = startGame;
    </script>
</body>
</html>
