<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一年級國語可愛樂園</title>
    <script src="data.js"></script>
    <style>
        /* 鎖定外層，禁止捲軸出現 */
        body { 
            font-family: "jf-open-huninn", "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 1.5vh 1.5vw; 
            background-color: #fff9e6; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; box-sizing: border-box; overflow: hidden;
        }

        /* 樂園大看板：高度設定為 96vh 留下一點邊框，絕不超出畫面 */
        .main-container {
            width: 100%; height: 96vh; max-width: 1400px; 
            background-color: #ffffff; border-radius: 50px;
            box-shadow: 0 15px 30px rgba(255, 182, 107, 0.2); border: 8px solid #ffde99;
            display: flex; flex-direction: column; align-items: center; 
            padding: 2vh 3vw; box-sizing: border-box; position: relative;
        }

        /* 裝飾背景小圖 */
        .bg-decoration { position: absolute; font-size: clamp(50px, 8vh, 80px); opacity: 0.1; z-index: 0; pointer-events: none; }
        .dec-1 { top: 2vh; left: 3vw; transform: rotate(-15deg); }
        .dec-2 { bottom: 3vh; right: 4vw; transform: rotate(20deg); }

        /* 標題區：縮減上下邊距 */
        .header-area { text-align: center; margin-bottom: 2vh; z-index: 10; flex-shrink: 0; }
        h1 { color: #e67e22; font-size: clamp(32px, 5vh, 60px); margin: 0 0 1vh 0; letter-spacing: 2px; text-shadow: 3px 3px 0px #ffeaa7; }
        .subtitle { font-size: clamp(18px, 3vh, 32px); color: #8d6e63; margin: 0; font-weight: bold; background: #fff3e0; padding: 1vh 3vw; border-radius: 50px; display: inline-block; }

        /* 左上角返回按鈕 */
        .back-btn { 
            position: absolute; top: 2.5vh; left: 2.5vw; background-color: #ffb74d; color: #fff; 
            text-decoration: none; font-size: clamp(16px, 2.5vh, 26px); font-weight: bold; 
            padding: 1vh 2vw; border-radius: 50px; box-shadow: 0 6px 0 #f57c00; transition: 0.2s; 
            border: 3px solid #fff; z-index: 20; 
        }
        .back-btn:active { transform: translateY(5px); box-shadow: none; }

        /* 🌟 核心防切邊修正：min-height: 0 讓網格可以自由縮小，不把父元素撐破 */
        .level-container { 
            display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 2vh 2vw; width: 100%; max-width: 1000px; 
            min-height: 0; flex-grow: 1; margin-bottom: 1vh; box-sizing: border-box; z-index: 10;
        }

        /* 卡片內部元素也全部依照視窗高度 (vh) 縮放 */
        .level-card { 
            border-radius: 4vh; text-decoration: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.2s; 
            border: 6px solid #fff; padding: 1vh 2vw; text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.08); position: relative;
            width: 100%; height: 100%; box-sizing: border-box; min-height: 0;
        }

        .level-card:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        .level-icon { font-size: clamp(50px, 10vh, 120px); margin-bottom: 1vh; line-height: 1;}
        .level-title { font-size: clamp(24px, 4vh, 45px); font-weight: bold; margin-bottom: 1.5vh; line-height: 1.3; }
        .level-desc { font-size: clamp(16px, 2.5vh, 26px); font-weight: bold; padding: 0.5vh 2vw; border-radius: 20px; background: rgba(255,255,255,0.6); }

        /* 四個關卡的專屬配色 */
        .card-1 { background-color: #ffe4e1; border-color: #ffb6c1; } .card-1 .level-title { color: #d81b60; } .card-1 .level-desc { color: #c2185b; }
        .card-2 { background-color: #e3f2fd; border-color: #90caf9; } .card-2 .level-title { color: #1976d2; } .card-2 .level-desc { color: #1565c0; }
        .card-3 { background-color: #e8f5e9; border-color: #a5d6a7; } .card-3 .level-title { color: #388e3c; } .card-3 .level-desc { color: #2e7d32; }
        .card-4 { background-color: #fff9c4; border-color: #fff59d; } .card-4 .level-title { color: #f57f17; } .card-4 .level-desc { color: #f57f17; }

    </style>
</head>
<body>
    <div class="main-container">
        <div class="bg-decoration dec-1">🎈</div>
        <div class="bg-decoration dec-2">🌈</div>

        <a href="index.html" class="back-btn">🏠 回 12 課大廳</a>

        <div class="header-area">
            <h1>🐻 可愛國語樂園 🐰</h1>
            <p class="subtitle" id="lesson-title-display">載入中...</p>
        </div>
        
        <div class="level-container">
            <a href="level1.html" id="link-lvl1" class="level-card card-1">
                <div class="level-icon">🐰</div>
                <div class="level-title">第一關<br>部件組裝</div>
                <div class="level-desc">把積木拼成字！</div>
            </a>
            
            <a href="level2.html" id="link-lvl2" class="level-card card-2">
                <div class="level-icon">🦉</div>
                <div class="level-title">第二關<br>找找錯別字</div>
                <div class="level-desc">找出躲起來的錯字！</div>
            </a>
            
            <a href="level3.html" id="link-lvl3" class="level-card card-3">
                <div class="level-icon">🐻</div>
                <div class="level-title">第三關<br>短語接力</div>
                <div class="level-desc">兩人合作拼句子！</div>
            </a>
            
            <a href="level4.html" id="link-lvl4" class="level-card card-4">
                <div class="level-icon">🦊</div>
                <div class="level-title">第四關<br>部首找找看</div>
                <div class="level-desc">兩人比賽找部首！</div>
            </a>
        </div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = urlParams.get('id') || "1";

            if (typeof allLessonsData !== 'undefined' && allLessonsData[lessonId]) {
                const lessonInfo = allLessonsData[lessonId];
                
                document.getElementById('lesson-title-display').innerText = "🌟 " + lessonInfo.title + " 🌟";

                document.getElementById('link-lvl1').href = `level1.html?id=${lessonId}`;
                document.getElementById('link-lvl2').href = `level2.html?id=${lessonId}`;
                document.getElementById('link-lvl3').href = `level3.html?id=${lessonId}`;
                document.getElementById('link-lvl4').href = `level4.html?id=${lessonId}`;
            } else {
                document.getElementById('lesson-title-display').innerText = "找不到這課的資料喔！";
                document.getElementById('lesson-title-display').style.color = "red";
            }
        };
    </script>
</body>
</html>
