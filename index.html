<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一年級國語可愛樂園</title>
    <style>
        /* 溫暖的奶油鵝黃色背景 */
        body { 
            font-family: "jf-open-huninn", "Microsoft JhengHei", sans-serif; 
            margin: 0;
            padding: 3vh 3vw; 
            background-color: #fff9e6; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 樂園大看板 */
        .main-container {
            width: 100%;
            max-width: 1400px;
            background-color: #ffffff;
            border-radius: 50px;
            box-shadow: 0 20px 40px rgba(255, 182, 107, 0.2);
            border: 8px solid #ffde99;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 3%;
            box-sizing: border-box;
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        /* 裝飾背景小圖 */
        .bg-decoration {
            position: absolute;
            font-size: 80px;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
        }
        .dec-1 { top: 20px; left: 30px; transform: rotate(-15deg); }
        .dec-2 { bottom: 30px; right: 40px; transform: rotate(20deg); }

        .header-area {
            text-align: center;
            margin-bottom: 40px;
            z-index: 10;
        }

        h1 { 
            color: #e67e22; 
            font-size: clamp(40px, 5vw, 70px); 
            margin: 0 0 15px 0; 
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #ffeaa7;
        }

        .subtitle { 
            font-size: clamp(22px, 2.5vw, 32px); 
            color: #8d6e63; 
            margin: 0; 
            font-weight: bold;
            background: #fff3e0;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
        }

        /* 左上角返回按鈕 */
        .back-btn { 
            position: absolute; 
            top: 30px; 
            left: 30px; 
            background-color: #ffb74d; 
            color: #fff; 
            text-decoration: none; 
            font-size: clamp(18px, 2vw, 26px); 
            font-weight: bold; 
            padding: 12px 25px; 
            border-radius: 50px; 
            box-shadow: 0 6px 0 #f57c00; 
            transition: 0.2s; 
            border: 3px solid #fff;
            z-index: 20;
        }
        .back-btn:hover { transform: translateY(5px); box-shadow: 0 0 0 #f57c00; background-color: #ffa726; }

        /* 2x2 的網格排列，專為四個關卡設計 */
        .level-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 40px; 
            width: 100%; 
            max-width: 1000px;
            z-index: 10;
            margin-top: 20px;
        }

        /* 圓滾滾的動物關卡卡片 */
        .level-card { 
            border-radius: 40px; 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 6px solid #fff; 
            padding: 40px 20px; 
            text-align: center; 
            min-height: 280px; 
            box-shadow: 0 12px 20px rgba(0,0,0,0.08);
            position: relative;
        }

        .level-card:hover { 
            transform: translateY(-15px) scale(1.03); 
            box-shadow: 0 25px 30px rgba(0,0,0,0.15); 
        }

        .level-icon { font-size: clamp(80px, 8vw, 130px); margin-bottom: 10px; }
        .level-title { font-size: clamp(32px, 3vw, 45px); font-weight: bold; margin-bottom: 10px; line-height: 1.3; }
        .level-desc { font-size: clamp(20px, 1.8vw, 26px); font-weight: bold; padding: 5px 20px; border-radius: 20px; background: rgba(255,255,255,0.6); }

        /* 四個關卡的專屬配色 */
        .card-1 { background-color: #ffe4e1; border-color: #ffb6c1; } 
        .card-1 .level-title { color: #d81b60; }
        .card-1 .level-desc { color: #c2185b; }

        .card-2 { background-color: #e3f2fd; border-color: #90caf9; } 
        .card-2 .level-title { color: #1976d2; }
        .card-2 .level-desc { color: #1565c0; }

        .card-3 { background-color: #e8f5e9; border-color: #a5d6a7; } 
        .card-3 .level-title { color: #388e3c; }
        .card-3 .level-desc { color: #2e7d32; }

        .card-4 { background-color: #fff9c4; border-color: #fff59d; } 
        .card-4 .level-title { color: #f57f17; }
        .card-4 .level-desc { color: #f57f17; }

        @media (max-width: 900px) {
            .level-container { grid-template-columns: 1fr; gap: 30px; }
            .back-btn { position: static; margin-bottom: 20px; display: inline-block;}
            .header-area { margin-top: 10px; }
            .level-card { min-height: 220px; padding: 30px 15px;}
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="bg-decoration dec-1">🎈</div>
        <div class="bg-decoration dec-2">🌈</div>

        <a href="index.html" class="back-btn">🏠 回首頁</a>

        <div class="header-area">
            <h1>🐻 可愛國語樂園 🐰</h1>
            <p class="subtitle" id="lesson-title-display">請選擇你要挑戰的遊戲喔！</p>
        </div>
        
        <div class="level-container">
            <a href="level1.html" id="link-lvl1" class="level-card card-1">
                <div class="level-icon">🐰</div>
                <div class="level-title">第一關<br>部件組裝</div>
                <div class="level-desc">把積木拼成字！</div>
            </a>
            
            <a href="level2.html" id="link-lvl2" class="level-card card-2">
                <div class="level-icon">🦉</div>
                <div class="level-title">第二關<br>找找錯別字</div>
                <div class="level-desc">找出躲起來的錯字！</div>
            </a>
            
            <a href="level3.html" id="link-lvl3" class="level-card card-3">
                <div class="level-icon">🐻</div>
                <div class="level-title">第三關<br>短語練習</div>
                <div class="level-desc">把句子變長長！</div>
            </a>
            
            <a href="level4.html" id="link-lvl4" class="level-card card-4">
                <div class="level-icon">🦊</div>
                <div class="level-title">第四關<br>部首找找看</div>
                <div class="level-desc">猜猜部首在哪裡？</div>
            </a>
        </div>
    </div>

    <script>
        window.onload = function() {
            // 如果您未來有用到 data.js 來控制不同課文，可以保留這段：
            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = urlParams.get('id');

            // 如果有帶入課次，自動修改標題跟連結
            if (lessonId && typeof allLessonsData !== 'undefined' && allLessonsData[lessonId]) {
                const lessonInfo = allLessonsData[lessonId];
                document.getElementById('lesson-title-display').innerText = "🌟 " + lessonInfo.title + " 🌟";

                document.getElementById('link-lvl1').href = `level1.html?id=${lessonId}`;
                document.getElementById('link-lvl2').href = `level2.html?id=${lessonId}`;
                document.getElementById('link-lvl3').href = `level3.html?id=${lessonId}`;
                document.getElementById('link-lvl4').href = `level4.html?id=${lessonId}`;
            }
        };
    </script>
</body>
</html>
